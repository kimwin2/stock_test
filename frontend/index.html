<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Stock Premium | 테마 보드</title>
  <meta name="description" content="모바일에서 빠르게 보는 주도 테마와 관련 종목">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="app-shell">
    <header class="app-header">
      <div class="header-top">
        <div class="brand-block">
          <div class="brand-mark">SP</div>
          <div>
            <p class="brand-label">THEME BOARD</p>
            <h1>Stock Premium</h1>
          </div>
        </div>
        <div class="session-chip" id="session-chip">세션 확인 중</div>
      </div>

      <div class="control-row">
        <label class="search-shell">
          <input type="search" id="search-input" placeholder="섹터, 종목 검색" autocomplete="off">
        </label>

        <label class="sort-shell" for="sort-select">
          <select id="sort-select">
            <option value="volume">거래대금</option>
            <option value="move">평균등락</option>
            <option value="name">이름순</option>
          </select>
        </label>
      </div>

      <div class="filter-row" id="filter-row"></div>
    </header>

    <main class="board-shell">
      <div id="loading-state" class="loading-state">
        <div class="spinner"></div>
        <p>데이터를 불러오는 중입니다.</p>
      </div>
      <section id="theme-list" class="theme-list"></section>
    </main>
  </div>

  <script src="app.js"></script>
</body>
</html>
