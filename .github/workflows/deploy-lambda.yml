name: Deploy Lambda Backend

on:
  push:
    branches: [main]
    paths:
      - 'backend/**'
      - 'template.yaml'
      - 'samconfig.toml'
      - '.github/workflows/deploy-lambda.yml'
  workflow_dispatch:  # 수동 실행 가능

env:
  AWS_REGION: ap-northeast-2
  STACK_NAME: stock-dashboard-stack
  LAMBDA_FUNCTION_NAME: stock-pipeline
  S3_BUCKET_NAME: stock-dashboard-data
  S3_OBJECT_URL: https://stock-dashboard-data.s3.ap-northeast-2.amazonaws.com/dashboard_data.json
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Setup AWS SAM CLI
        uses: aws-actions/setup-sam@v2
        with:
          use-installer: true

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: SAM Build
        run: sam build

      - name: SAM Deploy
        run: |
          sam deploy \
            --no-fail-on-empty-changeset \
            --parameter-overrides \
              "OpenAIApiKey=${{ secrets.OPENAI_API_KEY }}" \
              "S3BucketName=${{ secrets.S3_BUCKET_NAME || 'stock-dashboard-data' }}" \
              "TelegramApiId=${{ secrets.TG_API_ID || '' }}" \
              "TelegramApiHash=${{ secrets.TG_API_HASH || '' }}" \
              "TelegramStringSession=${{ secrets.TG_STRING_SESSION || '' }}" \
              "TelegramChannelUsername=${{ secrets.TG_CHANNEL_USERNAME || '@faststocknews' }}"

      - name: Invoke Lambda Async Refresh
        run: |
          aws lambda invoke \
            --function-name "$LAMBDA_FUNCTION_NAME" \
            --region "$AWS_REGION" \
            --invocation-type Event \
            --cli-binary-format raw-in-base64-out \
            --payload '{"source":"github-actions-post-deploy"}' \
            response.json
          cat response.json

      - name: Wait For S3 Refresh
        run: |
          PREV_UPDATED_AT=$(curl --silent "$S3_OBJECT_URL" | python3 -c 'import json,sys; print(json.load(sys.stdin).get("updatedAt",""))')
          echo "Previous updatedAt: $PREV_UPDATED_AT"

          for i in $(seq 1 24); do
            sleep 15
            CURRENT_UPDATED_AT=$(curl --silent "$S3_OBJECT_URL" | python3 -c 'import json,sys; print(json.load(sys.stdin).get("updatedAt",""))')
            echo "Attempt $i updatedAt=$CURRENT_UPDATED_AT"
            if [ -n "$CURRENT_UPDATED_AT" ] && [ "$CURRENT_UPDATED_AT" != "$PREV_UPDATED_AT" ]; then
              echo "S3 dashboard data refreshed."
              exit 0
            fi
          done

          echo "S3 dashboard_data.json was not refreshed within the expected time."
          exit 1
