name: Deploy Lambda Backend

on:
  push:
    branches: [main]
    paths:
      - 'backend/**'
      - 'template.yaml'
      - 'samconfig.toml'
      - '.github/workflows/deploy-lambda.yml'
  workflow_dispatch:  # 수동 실행 가능

env:
  AWS_REGION: ap-northeast-2
  STACK_NAME: stock-dashboard-stack
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Setup AWS SAM CLI
        uses: aws-actions/setup-sam@v2
        with:
          use-installer: true

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: SAM Build
        run: sam build

      - name: SAM Deploy
        run: |
          sam deploy \
            --no-fail-on-empty-changeset \
            --parameter-overrides \
              "OpenAIApiKey=${{ secrets.OPENAI_API_KEY }}" \
              "S3BucketName=${{ secrets.S3_BUCKET_NAME || 'stock-dashboard-data' }}"

      - name: Invoke Manual Refresh API
        run: |
          MANUAL_TRIGGER_URL=$(aws cloudformation describe-stacks \
            --stack-name "$STACK_NAME" \
            --region "$AWS_REGION" \
            --query "Stacks[0].Outputs[?OutputKey=='ManualTriggerUrl'].OutputValue" \
            --output text)

          echo "Manual trigger URL: $MANUAL_TRIGGER_URL"
          curl --fail --show-error --silent \
            -X POST \
            -H "Content-Type: application/json" \
            -d '{"source":"github-actions-post-deploy"}' \
            "$MANUAL_TRIGGER_URL"
