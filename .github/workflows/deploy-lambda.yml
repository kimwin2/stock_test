name: Deploy Lambda Backend

on:
  push:
    branches: [main]
  schedule:
    - cron: '0,10,20,30,40,50 23 * * SUN-THU'  # KST 08:00~08:50
    - cron: '0,10,20,30,40,50 0-6 * * MON-FRI'  # KST 09:00~15:50
    - cron: '0 7 * * MON-FRI'  # KST 16:00
  workflow_dispatch:  # 수동 실행 가능

env:
  AWS_REGION: ap-northeast-2
  STACK_NAME: stock-dashboard-stack
  LAMBDA_FUNCTION_NAME: stock-pipeline
  S3_BUCKET_NAME: stock-dashboard-data
  S3_OBJECT_URL: https://stock-dashboard-data.s3.ap-northeast-2.amazonaws.com/dashboard_data.json
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  detect_changes:
    runs-on: ubuntu-latest
    outputs:
      should_deploy: ${{ steps.check.outputs.should_deploy }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Detect deploy-related changes
        id: check
        shell: bash
        run: |
          if [ "${{ github.event_name }}" != "push" ]; then
            echo "should_deploy=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          BEFORE_SHA="${{ github.event.before }}"
          AFTER_SHA="${{ github.sha }}"

          if [ -z "$BEFORE_SHA" ] || [ "$BEFORE_SHA" = "0000000000000000000000000000000000000000" ]; then
            CHANGED_FILES="$(git diff-tree --no-commit-id --name-only -r "$AFTER_SHA")"
          else
            CHANGED_FILES="$(git diff --name-only "$BEFORE_SHA" "$AFTER_SHA")"
          fi

          printf 'Changed files:\n%s\n' "$CHANGED_FILES"

          if printf '%s\n' "$CHANGED_FILES" | grep -Eq '^(backend/|template\.yaml$|samconfig\.toml$|\.github/workflows/deploy-lambda\.yml$)'; then
            echo "should_deploy=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "should_deploy=false" >> "$GITHUB_OUTPUT"

  # 1) SAM 배포 — backend 또는 인프라 정의가 바뀔 때 실행
  deploy:
    needs: detect_changes
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'push' && needs.detect_changes.outputs.should_deploy == 'true')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Setup AWS SAM CLI
        uses: aws-actions/setup-sam@v2
        with:
          use-installer: true

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: SAM Build
        run: sam build

      - name: SAM Deploy
        env:
          GEMINI_KEY: ${{ secrets.GEMINI_API_KEY }}
          OPENAI_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          # GeminiApiKey 결정 우선순위:
          #   1) GEMINI_API_KEY 시크릿이 있으면 그 값 사용
          #   2) 아니면 OPENAI_API_KEY 시크릿이 Gemini 형식(AIza...) 이면 그 값 사용
          #   3) 둘 다 아니면 CFN UsePreviousValue 로 기존 stack 값 보존 (Lambda 가 console/CLI 로
          #      직접 갱신된 키를 잃지 않게 함)
          if [ -n "$GEMINI_KEY" ]; then
            KEY_PARAM=("GeminiApiKey=$GEMINI_KEY")
          elif [ -n "$OPENAI_KEY" ] && [[ "$OPENAI_KEY" == AIza* ]]; then
            KEY_PARAM=("GeminiApiKey=$OPENAI_KEY")
          else
            echo "::warning::No Gemini API key in GH secrets — preserving existing CFN stack value."
            KEY_PARAM=("ParameterKey=GeminiApiKey,UsePreviousValue=true")
          fi
          sam deploy \
            --no-fail-on-empty-changeset \
            --parameter-overrides \
              "${KEY_PARAM[@]}" \
              "S3BucketName=${{ secrets.S3_BUCKET_NAME || 'stock-dashboard-data' }}" \
              "TelegramApiId=${{ secrets.TG_API_ID || '' }}" \
              "TelegramApiHash=${{ secrets.TG_API_HASH || '' }}" \
              "TelegramStringSession=${{ secrets.TG_STRING_SESSION || '' }}" \
              "TelegramChannelUsername=${{ secrets.TG_CHANNEL_USERNAME || '@faststocknews' }}"

  # 2) 크롤링 — 배포가 필요한 push/workflow_dispatch에서는 새 Lambda 배포 후 실행
  crawl:
    needs:
      - detect_changes
      - deploy
    if: >-
      github.event_name == 'schedule' ||
      (github.event_name == 'workflow_dispatch' && needs.deploy.result == 'success') ||
      (github.event_name == 'push' && (
        needs.detect_changes.outputs.should_deploy != 'true' ||
        needs.deploy.result == 'success'
      ))
    runs-on: ubuntu-latest
    steps:
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Invoke Lambda Async Refresh
        run: |
          aws lambda invoke \
            --function-name "$LAMBDA_FUNCTION_NAME" \
            --region "$AWS_REGION" \
            --invocation-type Event \
            --cli-binary-format raw-in-base64-out \
            --payload '{"source":"github-actions-${{ github.event_name }}"}' \
            response.json
          cat response.json

      - name: Wait For S3 Refresh
        run: |
          PREV_UPDATED_AT=$(curl --silent "$S3_OBJECT_URL" | python3 -c 'import json,sys; print(json.load(sys.stdin).get("updatedAt",""))')
          echo "Previous updatedAt: $PREV_UPDATED_AT"

          for i in $(seq 1 24); do
            sleep 15
            CURRENT_UPDATED_AT=$(curl --silent "$S3_OBJECT_URL" | python3 -c 'import json,sys; print(json.load(sys.stdin).get("updatedAt",""))')
            echo "Attempt $i updatedAt=$CURRENT_UPDATED_AT"
            if [ -n "$CURRENT_UPDATED_AT" ] && [ "$CURRENT_UPDATED_AT" != "$PREV_UPDATED_AT" ]; then
              echo "S3 dashboard data refreshed."
              exit 0
            fi
          done

          echo "S3 dashboard_data.json was not refreshed within the expected time."
          exit 1
