AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: >
  Stock Dashboard Backend
  # S3 bucket: stock-dashboard-data
  - Lambda: 뉴스 크롤링 + ChatGPT 분석 + 종목 데이터
  - EventBridge: 10분마다 실행되는 스케줄러
  - S3: dashboard_data.json 저장

# ─────────────────────────────────────────
# Parameters
# ─────────────────────────────────────────
Parameters:
  OpenAIApiKey:
    Type: String
    NoEcho: true
    Description: OpenAI API Key (sk-...)

  S3BucketName:
    Type: String
    Default: stock-dashboard-data
    Description: S3 bucket name for storing dashboard JSON

  TelegramApiId:
    Type: String
    Default: ''
    NoEcho: true
    Description: Telegram API ID for signal collector

  TelegramApiHash:
    Type: String
    Default: ''
    NoEcho: true
    Description: Telegram API hash for signal collector

  TelegramStringSession:
    Type: String
    Default: ''
    NoEcho: true
    Description: Telegram StringSession for signal collector

  TelegramChannelUsername:
    Type: String
    Default: '@faststocknews'
    Description: Telegram channel username to collect

# ─────────────────────────────────────────
# Globals
# ─────────────────────────────────────────
Globals:
  Function:
    Runtime: python3.12
    Timeout: 300           # 5분 (크롤링 + API 호출 시간 확보)
    MemorySize: 512
    Architectures:
      - x86_64

# ─────────────────────────────────────────
# Resources
# ─────────────────────────────────────────
Resources:

  # ── S3 Bucket: 대시보드 데이터 저장소 ──
  DashboardBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Ref S3BucketName
      PublicAccessBlockConfiguration:
        BlockPublicAcls: false
        BlockPublicPolicy: false
        IgnorePublicAcls: false
        RestrictPublicBuckets: false
      CorsConfiguration:
        CorsRules:
          - AllowedHeaders: ['*']
            AllowedMethods: [GET]
            AllowedOrigins: ['*']
            MaxAge: 3600

  # ── S3 Bucket Policy: 퍼블릭 읽기 허용 ──
  DashboardBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref DashboardBucket
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Sid: PublicReadGetObject
            Effect: Allow
            Principal: '*'
            Action: 's3:GetObject'
            Resource: !Sub 'arn:aws:s3:::${S3BucketName}/*'

  # ── Lambda Function: 파이프라인 실행 ──
  StockPipelineFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: stock-pipeline
      CodeUri: backend/
      Handler: handler.lambda_handler
      Description: Stock pipeline (v4-slot-collision-fix)
      Environment:
        Variables:
          OPENAI_API_KEY: !Ref OpenAIApiKey
          S3_BUCKET_NAME: !Ref S3BucketName
          S3_KEY: dashboard_data.json
          TELEGRAM_SIGNAL_S3_KEY: signals/telegram_faststocknews_latest.json
          TELEGRAM_STATE_S3_KEY: signals/telegram_faststocknews_state.json
      Policies:
        - S3CrudPolicy:
            BucketName: !Ref S3BucketName
      Events:
        ScheduleEvent:
          Type: Schedule
          Properties:
            Schedule: rate(10 minutes)
            Name: stock-pipeline-schedule
            Description: 10분마다 파이프라인 실행
            Enabled: true
        # 수동 실행용 HTTP API 엔드포인트
        ManualTrigger:
          Type: Api
          Properties:
            Path: /run
            Method: post

  TelegramSignalCollectorFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: telegram-signal-collector
      CodeUri: backend/
      Handler: telegram.handler.lambda_handler
      Description: Telegram faststocknews signal collector
      Environment:
        Variables:
          S3_BUCKET_NAME: !Ref S3BucketName
          TELEGRAM_SIGNAL_S3_KEY: signals/telegram_faststocknews_latest.json
          TELEGRAM_STATE_S3_KEY: signals/telegram_faststocknews_state.json
          TG_API_ID: !Ref TelegramApiId
          TG_API_HASH: !Ref TelegramApiHash
          TG_STRING_SESSION: !Ref TelegramStringSession
          TG_CHANNEL_USERNAME: !Ref TelegramChannelUsername
          TG_LOOKBACK_MINUTES: '180'
          TG_MAX_ITEMS: '20'
          TG_MIN_SCORE: '0.35'
      Policies:
        - S3CrudPolicy:
            BucketName: !Ref S3BucketName
      Events:
        ScheduleEvent:
          Type: ScheduleV2
          Properties:
            ScheduleExpression: cron(0/5 8-17 ? * MON-FRI *)
            ScheduleExpressionTimezone: Asia/Seoul
            Name: telegram-faststocknews-collector
            Description: Collect Telegram signals every 5 minutes during KST market hours
            State: ENABLED
            Input: !Sub '{"source":"eventbridge-scheduler","channel":"${TelegramChannelUsername}"}'
        FinalCloseEvent:
          Type: ScheduleV2
          Properties:
            ScheduleExpression: cron(0 18 ? * MON-FRI *)
            ScheduleExpressionTimezone: Asia/Seoul
            Name: telegram-faststocknews-collector-close
            Description: Collect Telegram signals at 18:00 KST close
            State: ENABLED
            Input: !Sub '{"source":"eventbridge-scheduler-close","channel":"${TelegramChannelUsername}"}'

# ─────────────────────────────────────────
# Outputs
# ─────────────────────────────────────────
Outputs:
  LambdaFunctionArn:
    Description: Lambda 함수 ARN
    Value: !GetAtt StockPipelineFunction.Arn

  TelegramCollectorFunctionArn:
    Description: Telegram collector Lambda 함수 ARN
    Value: !GetAtt TelegramSignalCollectorFunction.Arn

  ManualTriggerUrl:
    Description: 수동 실행 API URL (POST 요청)
    Value: !Sub 'https://${ServerlessRestApi}.execute-api.${AWS::Region}.amazonaws.com/Prod/run'

  S3BucketUrl:
    Description: S3 대시보드 데이터 URL
    Value: !Sub 'https://${S3BucketName}.s3.ap-northeast-2.amazonaws.com/dashboard_data.json'

  S3BucketName:
    Description: S3 버킷 이름
    Value: !Ref DashboardBucket
